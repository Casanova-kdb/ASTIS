spring:
  application:
    name: astis-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:astis}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt:
      secret: ${JWT_SECRET:astis-development-secret-key-change-before-production-2026}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  ai:
    deepseek:
      enabled: ${DEEPSEEK_ENABLED:true}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
      temperature: ${DEEPSEEK_TEMPERATURE:0.3}
      max-tokens: ${DEEPSEEK_MAX_TOKENS:600}
