spring:
  datasource:
    url: jdbc:h2:mem:astis-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

app:
  security:
    jwt:
      secret: astis-test-secret-key-change-before-production-2026
      expiration-ms: 86400000
  ai:
    deepseek:
      enabled: false
      base-url: https://api.deepseek.com
      api-key:
      model: deepseek-v4-flash
      temperature: 0.3
      max-tokens: 600
